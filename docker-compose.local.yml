# Lokal override: eksponer frontend på host-port uden Traefik.
# Kør: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - default
    labels: []

  exercise-api:
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - default

networks:
  default:
  dokploy-network:
    external: false
  internal:
    external: false
